<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cosmetic Dataset</title>

<style>

body{
    font-family:Arial, sans-serif;
    background:#0d1117;
    color:white;
    margin:20px;
}

h1{
    text-align:center;
}

#search{
    width:40%;
    padding:10px;
    margin:20px auto;
    display:block;
    border-radius:6px;
    border:none;
    font-size:16px;
}

.table-container{
    overflow-x:auto;
}

table{
    width:100%;
    border-collapse:collapse;
}

th{
    background:#161b22;
    color:white;
    padding:10px;
    border:1px solid #30363d;
}

td{
    padding:8px;
    border:1px solid #30363d;
}

tr:nth-child(even){
    background:#161b22;
}

tr:hover{
    background:#21262d;
}

</style>

</head>

<body>

<h1>Cosmetic Dataset</h1>

<input
type="text"
id="search"
placeholder="Search..."
onkeyup="searchTable()">

<div class="table-container">

<table id="myTable">

<thead>
<tr>

{% for col in columns %}
<th>{{ col }}</th>
{% endfor %}

</tr>
</thead>

<tbody>

{% for row in data %}
<tr>

{% for col in columns %}
<td>{{ row[col] }}</td>
{% endfor %}

</tr>
{% endfor %}

</tbody>

</table>

</div>

<script>

function searchTable(){

let input=document.getElementById("search").value.toUpperCase();

let table=document.getElementById("myTable");

let tr=table.getElementsByTagName("tr");

for(let i=1;i<tr.length;i++){

let rowText=tr[i].innerText.toUpperCase();

if(rowText.indexOf(input)>-1)
tr[i].style.display="";
else
tr[i].style.display="none";

}

}

</script>

</body>
</html>
