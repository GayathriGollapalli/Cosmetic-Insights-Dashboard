<!DOCTYPE html>
<html>
<head>
    <title>Cosmetic Brands</title>

    <style>
        body {
            font-family: Arial;
        }

        h1 {
            text-align: center;
        }

        .brand-container {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            padding: 30px;
        }

        .brand-card {
            width: 180px;
            padding: 15px;
            text-align: center;
            background: #f5f5f5;
            border-radius: 10px;
            color: black;
            font-weight: bold;
            box-shadow: 0 0 8px #ccc;
        }
    </style>

</head>

<body>

<h1>Cosmetic Brands</h1>

<div class="brand-container">

{% for brand in brands %}

<div class="brand-card">
    {{ brand }}
</div>

{% endfor %}

</div>

</body>
</html>
